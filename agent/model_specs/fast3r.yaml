# ═══════════════════════════════════════════════════════════════
# Fast3R Model Blueprint
# 多图一次前向，1000+ 图片级别快速 3D 重建
# ═══════════════════════════════════════════════════════════════

# ─────────────── 身份标签 ───────────────
name: Fast3R
key: fast3r
family: dust3r
version: "main@latest"
paper:
  title: "Fast3R: Towards 3D Reconstruction of 1000+ Images in One Forward Pass"
  url: https://arxiv.org/abs/2501.13928
  venue: arXiv 2025
  year: 2025

# ─────────────── 能力标签 ───────────────
tags:
  type: fast_multiview
  input: [images, video]
  output: [pointcloud, camera_poses, confidence]
  paradigm: feedforward
  scene: static

# ─────────────── 源码配置 ───────────────
repo:
  url: https://github.com/mli0603/Fast3R
  branch: main
  commit: ""
  submodules: []
  server_path: /hdd3/kykt26/code/fast3r

# ─────────────── 环境配置 ───────────────
environment:
  conda_env: fast3r
  python: "3.11"
  torch: "2.5.1+cu121"
  cuda_toolkit: /usr/local/cuda-12.6
  cuda_arch: "7.5"
  create_strategy: fresh
  clone_source: ""
  pip_requirements: requirements.txt
  extra_pip: []
  exclude_pip: []
  system_deps: []

# ─────────────── 权重/检查点 ───────────────
checkpoints:
  - name: Fast3R_ViT_Large_512/model.safetensors
    path: /hdd3/kykt26/models/fast3r/
    source: huggingface
    url: https://huggingface.co/jedyang97/Fast3R_ViT_Large_512
    size_gb: 1.4
    hash: ""
    required: true

# ─────────────── 编译步骤 ───────────────
build_steps: []
# Fast3R 不需要 curope（官方明确要求不要装 DUSt3R 的 cuROPE）

# ─────────────── 资源需求 ───────────────
resources:
  gpu_memory_gb: 16.0     # 取决于输入图片数量
  ram_gb: 32.0
  disk_gb: 5.0
  max_frames: ~           # 理论支持 1000+，TITAN RTX 受限
  batch_size_limit: 1

# ─────────────── 健康检查 ───────────────
health_checks:
  - name: fast3r_import
    type: import
    command: "python -c \"from fast3r.dust3r.model import AsymmetricCroCo3DStereo; print('IMPORT_OK')\""
    expected: "IMPORT_OK"
    critical: true
  - name: checkpoint_exists
    type: file_exists
    command: "test -f /hdd3/kykt26/models/fast3r/Fast3R_ViT_Large_512/model.safetensors"
    expected: ""
    critical: true
  - name: no_curope_conflict
    type: command
    command: "python -c \"import importlib.util; assert importlib.util.find_spec('curope') is None; print('NO_CUROPE')\""
    expected: "NO_CUROPE"
    critical: false     # 不致命但会影响结果质量

smoke_test:
  script: "python -c \"from fast3r.dust3r.model import AsymmetricCroCo3DStereo; print('OK')\""
  timeout_sec: 60
  expected: "OK"
  output_files: []

# ─────────────── Runner 配置 ───────────────
runner:
  script: runners/fast3r_runner.py
  conda_env: fast3r
  entry_pattern: fast3r_runner.py
  default_params:
    image_size: 512
    attention_backend: pytorch_naive    # TITAN RTX sm75 不支持 FlashAttention
  param_tiers:
    fast:
      image_size: 224
      attention_backend: pytorch_naive
    standard:
      image_size: 512
      attention_backend: pytorch_naive
    enhanced:
      image_size: 512
      attention_backend: pytorch_naive

# ─────────────── 输出合同 ───────────────
output_contract:
  required:
    - key: pointcloud
      pattern: "pointcloud.ply"
      type: ply
      description: "Feedforward reconstructed point cloud"
    - key: camera_poses
      pattern: "camera_poses.json"
      type: json
      description: "Estimated camera poses for all input images"
    - key: scene_meta
      pattern: "scene_meta.json"
      type: json
      description: "Model/run metadata"
  optional:
    - key: confidence
      pattern: "confidence_summary.json"
      type: json
    - key: metadata
      pattern: "metadata.json"
      type: json
    - key: log
      pattern: "runner.log"
      type: txt
  scene_meta:
    - field: model
      type: str
    - field: num_images
      type: int
    - field: num_points
      type: int
    - field: attention_backend
      type: str
    - field: duration_sec
      type: float

# ─────────────── 已知问题 ───────────────
known_issues:
  - id: fast3r-001
    description: "TITAN RTX (sm75) 不支持 FlashAttention，必须用 pytorch_naive"
    workaround: "default_params 中设 attention_backend=pytorch_naive"
    resolved: true
    resolved_date: "2026-04-25"
  - id: fast3r-002
    description: "不能安装 DUSt3R 的 cuROPE，否则会影响重建结果"
    workaround: "使用独立 env，不复用 dust3r/mast3r"
    resolved: true
    resolved_date: "2026-04-25"

# ─────────────── 兼容矩阵 ───────────────
compatibility:
  gpu_models: ["TITAN RTX"]
  os: ["Ubuntu 20.04"]
  glibc_min: "2.31"
  driver_min: "535"

# ─────────────── 状态 ───────────────
status: integrated
priority: high
last_verified: "2026-04-25"
