# ═══════════════════════════════════════════════════════════════
# Align3R Model Blueprint
# 视频时间一致性深度 + 动态点云 + 相机位姿
# 依赖 Depth Pro / Depth Anything V2 外部深度模型增强 DUSt3R
# ═══════════════════════════════════════════════════════════════

# ─────────────── 身份标签 ───────────────
name: Align3R
key: align3r
family: dust3r
version: "main@latest"
paper:
  title: "Align3R: Aligned Monocular Depth Estimation for Dynamic Videos"
  url: https://arxiv.org/abs/2412.04079
  venue: arXiv 2024
  year: 2024

# ─────────────── 能力标签 ───────────────
tags:
  type: video_depth
  input: [video, images]
  output: [depth, pointcloud, camera_poses, dynamic_pointcloud]
  paradigm: pairwise
  scene: dynamic

# ─────────────── 源码配置 ───────────────
repo:
  url: https://github.com/jiah-cloud/Align3R
  branch: main
  commit: ""
  submodules: [croco]
  server_path: /hdd3/kykt26/code/align3r

# ─────────────── 环境配置 ───────────────
environment:
  conda_env: align3r
  python: "3.11"
  torch: "2.5.1+cu121"
  cuda_toolkit: /usr/local/cuda-12.6
  cuda_arch: "7.5"
  create_strategy: fresh       # 不复用 monst3r（依赖冲突风险）
  clone_source: ""
  pip_requirements: requirements.txt
  extra_pip: []
  exclude_pip: []
  system_deps: []

# ─────────────── 权重/检查点 ───────────────
checkpoints:
  - name: DepthPro/model.safetensors
    path: checkpoints/
    source: huggingface
    url: ""
    size_gb: 1.8
    hash: ""
    required: true
  - name: DepthAnythingV2/model.safetensors
    path: checkpoints/
    source: huggingface
    url: ""
    size_gb: 1.3
    hash: ""
    required: true
  # Align3R 还依赖 RAFT 光流权重（用于动态 mask）
  # 可选：与 MonST3R 共享或单独下载

# ─────────────── 编译步骤 ───────────────
build_steps:
  - name: compile_curope
    cmd: "python setup.py build_ext --inplace"
    cwd: croco/models/curope
    env:
      TORCH_CUDA_ARCH_LIST: "7.5"
      CUDA_HOME: "/usr/local/cuda-12.6"
    verify: "ls croco/models/curope/curope*.so"
    notes: |
      2026-05-03 重编修复：
      - 旧文档误诊为"CUDA 11.3 vs torch cu121 mismatch"
      - 实际系统是 /usr/local/cuda-12.6/bin/nvcc
      - 真正阻塞是 .so 需要 GLIBC_2.32 但宿主 libc 太老
      - 修复：原地重编，新 .so 时间戳 5月3 19:01

# ─────────────── 资源需求 ───────────────
resources:
  gpu_memory_gb: 20.0     # Depth Pro + DUSt3R 同时加载
  ram_gb: 32.0
  disk_gb: 10.0
  max_frames: 72          # 预估，24GB 显存限制
  batch_size_limit: 1

# ─────────────── 健康检查 ───────────────
health_checks:
  - name: align3r_import
    type: import
    command: "python -c \"from dust3r.model import AsymmetricCroCo3DStereo; print('IMPORT_OK')\""
    expected: "IMPORT_OK"
    critical: true
  - name: curope_cuda_kernel
    type: cuda_kernel
    command: "python -c \"from croco.models.curope import cuRoPE2D; r=cuRoPE2D(); print('CUROPE_OK')\""
    expected: "CUROPE_OK"
    critical: true
  - name: depth_pro_ckpt
    type: file_exists
    command: "test -f checkpoints/DepthPro/model.safetensors"
    expected: ""
    critical: true
  - name: depth_anything_ckpt
    type: file_exists
    command: "test -f checkpoints/DepthAnythingV2/model.safetensors"
    expected: ""
    critical: true

smoke_test:
  script: "python -c \"from dust3r.model import AsymmetricCroCo3DStereo; from croco.models.curope import cuRoPE2D; print('OK')\""
  timeout_sec: 120
  expected: "OK"
  output_files: []

# ─────────────── Runner 配置 ───────────────
runner:
  script: runners/align3r_runner.py
  conda_env: align3r
  entry_pattern: align3r_runner.py
  default_params:
    image_size: 512
    depth_model: depth_pro    # "depth_pro" | "depth_anything_v2"
    num_frames: 48
  param_tiers:
    fast:
      image_size: 224
      num_frames: 24
    standard:
      image_size: 512
      num_frames: 48
    enhanced:
      image_size: 512
      num_frames: 72

# ─────────────── 输出合同 ───────────────
output_contract:
  required:
    - key: pointcloud
      pattern: "pointcloud.ply"
      type: ply
      description: "Temporally consistent 3D point cloud"
    - key: scene_meta
      pattern: "scene_meta.json"
      type: json
      description: "Model/run metadata"
  optional:
    - key: depth_frames
      pattern: "depth_*.png"
      type: png
    - key: camera_poses
      pattern: "camera_poses.json"
      type: json
    - key: dynamic_mask
      pattern: "dynamic_mask_*.png"
      type: png
    - key: log
      pattern: "runner.log"
      type: txt
  scene_meta:
    - field: model
      type: str
    - field: depth_model
      type: str
    - field: num_frames
      type: int
    - field: duration_sec
      type: float

# ─────────────── 已知问题 ───────────────
known_issues:
  - id: align3r-001
    description: "旧文档误诊为 CUDA 11.3 mismatch，实际是 GLIBC_2.32 问题"
    workaround: "原地重编 curope（已修复 2026-05-03）"
    resolved: true
    resolved_date: "2026-05-03"
  - id: align3r-002
    description: "依赖多（DUSt3R + Depth Pro + DAv2 + RAFT + curope），安装复杂"
    workaround: "按本 blueprint 顺序安装；curope 最后编译"
    resolved: true
    resolved_date: "2026-05-03"
  - id: align3r-003
    description: "Runner 尚未编写"
    workaround: "待完成 align3r_runner.py"
    resolved: false
    resolved_date: ""

# ─────────────── 兼容矩阵 ───────────────
compatibility:
  gpu_models: ["TITAN RTX"]
  os: ["Ubuntu 20.04"]
  glibc_min: "2.31"
  driver_min: "535"

# ─────────────── 状态 ───────────────
status: env_ready
priority: high
last_verified: "2026-05-03"
