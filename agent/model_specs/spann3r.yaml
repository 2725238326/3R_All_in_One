name: Spann3R
family: dust3r
description: "Spatial Memory Network for 3D Reconstruction"
paper: "https://arxiv.org/abs/2410.10611"
type: spatial_memory

repo:
  url: https://github.com/HengyiWang/spann3r
  branch: main
  server_path: /hdd3/kykt26/code/spann3r

environment:
  conda_env: spann3r
  python: "3.11"
  torch: "2.5.1+cu121"
  cuda_arch: "7.5"

checkpoints:
  - name: DUSt3R_ViTLarge_BaseDecoder_512_dpt.pth
    path: checkpoints/
    size_gb: 1.3
  - name: spann3r.pth
    path: checkpoints/
    size_gb: 1.3

build_steps:
  - cmd: "cd croco/models/curope && python setup.py build_ext --inplace"
    env:
      TORCH_CUDA_ARCH_LIST: "7.5"
      CUDA_HOME: "/usr/local/cuda-12.6"

smoke_test:
  script: "python -c \"from spann3r.model import Spann3R; print('OK')\""
  expected: "OK"

runner:
  script: runners/spann3r_runner.py
  conda_env: spann3r
  default_params:
    image_size: 512
    kf_every: 5

output_contract:
  required:
    - pointcloud.ply
    - scene_meta.json

status: integrated
priority: high
