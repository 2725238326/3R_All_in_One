version: '3.8'

services:
  monst3r:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monst3r-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./local_jobs:/app/local_jobs
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/app/data
      - LOCAL_JOBS_DIR=/app/local_jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: monst3r-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Optional: PostgreSQL for persistent storage
  postgres:
    image: postgres:15-alpine
    container_name: monst3r-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=monst3r
      - POSTGRES_USER=monst3r
      - POSTGRES_PASSWORD=monst3r_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
